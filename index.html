<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<link rel="icon" type="image/png" href="/favicon.png" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="stylesheet" href="src/style.css">
	<title>TypePerfect</title>

	<meta name="description"
		content="Test your speed and accuracy with the cleanest typing game on the internet. Keyboard only controls.">
	<meta property="og:title" content="TypePerfect">
	<meta property="og:description"
		content="Test your speed and accuracy with the cleanest typing game on the internet. Keyboard only controls.">
	<meta property="og:url" content="https://typeperfect.io">

	<script type="application/ld+json">
		{
		"@context": "https://schema.org",
		"@type": "WebApplication",
		"name": "TypePerfect",
		"url": "https://typeperfect.io",
		"description": "Test your speed and accuracy with the cleanest typing game on the internet. Keyboard only controls.",
		"applicationCategory": "GameApplication",
		"operatingSystem": "Web"
		}
	</script>
</head>

<body>
	<header>
		<h1 id="title">TypePerfect</h1>
	</header>
	<div id="stats" class="hidden">
		<div class="stat">
			<div class="stat-label">Time</div>
			<div class="stat-value" id="time-left">&nbsp;</div>
		</div>
		<div class="stat">
			<div class="stat-label">WPM</div>
			<div class="stat-value" id="wpm">&nbsp;</div>
		</div>
		<div class="stat hidden">
			<div class="stat-label">Words</div>
			<div class="stat-value" id="words-typed">&nbsp;</div>
		</div>
		<div class="stat hidden">
			<div class="stat-label">Characters</div>
			<div class="stat-value" id="characters">&nbsp;</div>
		</div>
		<div class="stat hidden">
			<div class="stat-label">Missed</div>
			<div class="stat-value" id="missed">&nbsp;</div>
		</div>
		<div class="stat">
			<div class="stat-label">Accuracy</div>
			<div class="stat-value" id="accuracy">&nbsp;</div>
		</div>
	</div>
	<div id="typing-row">
		<textarea id="input" autocorrect="off" autocomplete="off" autocapitalize="off" spellcheck="false"
			rows="1"></textarea>
		<div id="caret" class="underscore">&nbsp;</div>
		<div id="letters-container" class="hidden"></div>
	</div>
	<div id="output"></div>
	<div id="seed"></div>
</body>
<script type="module" src="/src/main.ts"></script>
</body>

</html>
