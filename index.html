<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>typeperfect</title>
</head>

<body>
	<header>
		<h1 id="title">TypePerfect_</h1>
	</header>
	<div id="stats">
		<div class="stat">
			<div class="stat-label">Time</div>
			<div class="stat-value" id="time-left">--</div>
		</div>
		<div class="stat">
			<div class="stat-label">WPM</div>
			<div class="stat-value" id="wpm">--</div>
		</div>
		<div class="stat hidden">
			<div class="stat-label">Words</div>
			<div class="stat-value" id="words-typed">--</div>
		</div>
		<div class="stat hidden">
			<div class="stat-label">Characters</div>
			<div class="stat-value" id="characters">--</div>
		</div>
		<div class="stat hidden">
			<div class="stat-label">Missed</div>
			<div class="stat-value" id="missed">--</div>
		</div>
		<div class="stat">
			<div class="stat-label">Accuracy</div>
			<div class="stat-value" id="accuracy">--</div>
		</div>
	</div>
	<div id="typing-row">
		<textarea id="input" class="visible" autocorrect="off" autocomplete="off" autocapitalize="off"
			spellcheck="false" rows="1"></textarea>
		<div id="caret" class="underscore">&nbsp;</div>
		<div id="letters-container"></div>
	</div>
	<div id="help"></div>
</body>
<script type="module" src="/src/main.ts"></script>
</body>

</html>
